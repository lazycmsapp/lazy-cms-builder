<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Browser window -->
  <rect width="480" height="360" rx="16" fill="#1a1a2e"/>

  <!-- Browser chrome -->
  <rect x="16" y="16" width="448" height="32" rx="8" fill="#16213e"/>
  <circle cx="36" cy="32" r="5" fill="#ff5f57"/>
  <circle cx="52" cy="32" r="5" fill="#febc2e"/>
  <circle cx="68" cy="32" r="5" fill="#28c840"/>
  <rect x="88" y="24" width="280" height="16" rx="8" fill="#0f3460" opacity=".8"/>
  <text x="158" y="36" fill="#6b7db3" font-size="9" font-family="monospace">lazycmsapp.github.io/lazy-cms-builder</text>

  <!-- Builder canvas area -->
  <rect x="16" y="56" width="100" height="288" rx="6" fill="#16213e"/>

  <!-- Sidebar elements -->
  <rect x="24" y="68" width="84" height="10" rx="4" fill="#0f3460"/>
  <rect x="24" y="84" width="84" height="28" rx="6" fill="#1a4a7a" opacity=".7"/>
  <text x="38" y="103" fill="#6b9fd4" font-size="8" font-family="sans-serif">⬛ Heading</text>
  <rect x="24" y="116" width="84" height="28" rx="6" fill="#1a4a7a" opacity=".5"/>
  <text x="40" y="135" fill="#6b9fd4" font-size="8" font-family="sans-serif">🖼 Image</text>
  <rect x="24" y="148" width="84" height="28" rx="6" fill="#1a4a7a" opacity=".5"/>
  <text x="38" y="167" fill="#6b9fd4" font-size="8" font-family="sans-serif">🔘 Button</text>
  <rect x="24" y="180" width="84" height="28" rx="6" fill="#1a4a7a" opacity=".5"/>
  <text x="39" y="199" fill="#6b9fd4" font-size="8" font-family="sans-serif">📝 Text</text>
  <rect x="24" y="212" width="84" height="28" rx="6" fill="#1a4a7a" opacity=".4"/>
  <text x="36" y="231" fill="#6b9fd4" font-size="8" font-family="sans-serif">🗂 Gallery</text>
  <rect x="24" y="244" width="84" height="28" rx="6" fill="#1a4a7a" opacity=".3"/>
  <text x="36" y="263" fill="#6b9fd4" font-size="8" font-family="sans-serif">📊 Counter</text>

  <!-- Main canvas -->
  <rect x="124" y="56" width="340" height="288" rx="6" fill="#0d1117"/>

  <!-- Container row 1 - header-like -->
  <rect x="132" y="64" width="324" height="52" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Logo placeholder -->
  <rect x="142" y="76" width="60" height="12" rx="3" fill="#3b82f6" opacity=".6"/>
  <rect x="142" y="92" width="40" height="8" rx="2" fill="#3b82f6" opacity=".3"/>
  <!-- Nav items -->
  <rect x="282" y="83" width="30" height="8" rx="2" fill="#6b7280" opacity=".5"/>
  <rect x="318" y="83" width="30" height="8" rx="2" fill="#6b7280" opacity=".5"/>
  <rect x="354" y="79" width="36" height="16" rx="8" fill="#3b82f6" opacity=".7"/>
  <!-- Active/selected indicator -->
  <rect x="131" y="63" width="326" height="54" rx="5" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 2" opacity=".6"/>

  <!-- Container row 2 - hero section -->
  <rect x="132" y="124" width="156" height="112" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="142" y="136" width="100" height="10" rx="3" fill="#f0f6fc" opacity=".8"/>
  <rect x="142" y="152" width="120" height="7" rx="2" fill="#f0f6fc" opacity=".4"/>
  <rect x="142" y="163" width="110" height="7" rx="2" fill="#f0f6fc" opacity=".3"/>
  <rect x="142" y="178" width="64" height="20" rx="10" fill="#3b82f6" opacity=".8"/>
  <rect x="213" y="178" width="54" height="20" rx="10" fill="#30363d" opacity=".8"/>

  <rect x="296" y="124" width="160" height="112" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Image placeholder -->
  <rect x="304" y="132" width="144" height="96" rx="4" fill="#0f3460" opacity=".6"/>
  <text x="352" y="182" fill="#3b82f6" font-size="22" font-family="sans-serif" opacity=".5">🖼</text>

  <!-- Container row 3 - 3 columns -->
  <rect x="132" y="244" width="100" height="76" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="240" y="244" width="100" height="76" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="348" y="244" width="108" height="76" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Card 1 -->
  <rect x="140" y="252" width="84" height="36" rx="3" fill="#0f3460" opacity=".5"/>
  <rect x="140" y="294" width="60" height="6" rx="2" fill="#f0f6fc" opacity=".5"/>
  <rect x="140" y="304" width="72" height="5" rx="2" fill="#f0f6fc" opacity=".25"/>

  <!-- Card 2 -->
  <rect x="248" y="252" width="84" height="36" rx="3" fill="#0f3460" opacity=".5"/>
  <rect x="248" y="294" width="60" height="6" rx="2" fill="#f0f6fc" opacity=".5"/>
  <rect x="248" y="304" width="72" height="5" rx="2" fill="#f0f6fc" opacity=".25"/>

  <!-- Card 3 -->
  <rect x="356" y="252" width="92" height="36" rx="3" fill="#0f3460" opacity=".5"/>
  <rect x="356" y="294" width="68" height="6" rx="2" fill="#f0f6fc" opacity=".5"/>
  <rect x="356" y="304" width="80" height="5" rx="2" fill="#f0f6fc" opacity=".25"/>

  <!-- Drag handle (currently selected element glow) -->
  <rect x="131" y="243" width="326" height="78" rx="5" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 2" opacity=".5"/>

  <!-- Top-right badge -->
  <rect x="360" y="24" width="60" height="16" rx="8" fill="#10b981" opacity=".15"/>
  <text x="372" y="35" fill="#10b981" font-size="8" font-family="monospace" font-weight="bold">v1.0.7</text>
</svg>
